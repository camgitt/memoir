<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    background: #1a1918;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
    position: relative;
  }

  /* Neural network background */
  .node {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #c6e76e;
    border-radius: 50%;
    opacity: 0.5;
  }
  .node.bright { opacity: 0.85; width: 8px; height: 8px; }

  svg.lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .center {
    position: relative;
    z-index: 10;
    text-align: center;
  }

  /* Bot icon */
  .bot {
    display: inline-block;
    margin-bottom: 20px;
  }

  .title {
    font-size: 88px;
    color: #f5f4f0;
    letter-spacing: 18px;
    font-weight: 400;
    margin-bottom: 12px;
  }

  .divider {
    width: 80px;
    height: 3px;
    background: #c6e76e;
    margin: 0 auto 20px;
  }

  .tagline {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    color: #a8a5a0;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .tools {
    font-family: 'Courier New', monospace;
    font-size: 15px;
    color: #6b6965;
    letter-spacing: 1px;
  }
</style>
</head>
